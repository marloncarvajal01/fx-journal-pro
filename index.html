<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FX Journal Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>

    <div id="auth-container" style="display:none; height:100vh; flex-direction:column; align-items:center; justify-content:center; background:#0b0f19;">
        <div class="card" style="width:320px; text-align:center;">
            <h2 style="color:#22c55e;">Bienvenido</h2>
            <input type="email" id="login-email" placeholder="Correo electrónico">
            <input type="password" id="login-pass" placeholder="Contraseña">
            <button onclick="login()" style="width:100%; margin-bottom:10px;">Entrar</button>
            <button onclick="register()" style="width:100%; background:#1f2937; color:#9ca3af;">Crear Cuenta</button>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <div class="app">
            <div class="sidebar">
                <h2>FX JOURNAL</h2>
                <ul>
                    <li onclick="navigate('newTrade')">➕ Nuevo Trade</li>
                    <li onclick="navigate('dashboard')">🏠 Dashboard</li>
                    <li onclick="navigate('calendar')">📅 Calendario</li>
                    <li onclick="navigate('stats')">📊 Estadísticas</li>
                    <li onclick="logout()" style="margin-top:50px; color:#ef4444;">🚪 Salir</li>
                </ul>
            </div>
            <div class="content" id="content">
                </div>
        </div>
    </div>

    <div id="imgModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center;" onclick="this.style.display='none'">
        <img id="modalImg" style="max-width:90%; max-height:90%; border-radius:8px;">
    </div>

    <script src="app.js"></script>
</body>
</html>
