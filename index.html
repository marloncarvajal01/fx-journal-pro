<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradelogix | Terminal Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>

    <div id="auth-container" style="display:none;" class="auth-wrapper">
        <div class="login-box">
            <div class="brand-container">
                <span class="iso-x-premium">X</span>
                <h1 class="brand-name">TRADELOGIX</h1>
            </div>
            <div class="hero-section">
                <h2 class="hero-title">Terminal Profesional de Trading</h2>
                <p class="hero-subtitle">Control total <br>de tu <span class="accent-text">capital</span></p>
            </div>
            <div class="card glass-effect">
                <div class="input-wrapper-pro">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="login-email" placeholder="Correo electrónico">
                </div>
                <div class="input-wrapper-pro">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="login-pass" placeholder="Contraseña">
                </div>
                <button onclick="login()" class="main-btn">Iniciar sesión <i class="fas fa-arrow-right"></i></button>
                <button onclick="register()" class="btn-ghost">Solicitar Acceso</button>
            </div>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <div class="app-container">
            <nav class="sidebar">
                <div class="sidebar-header">
                    <div class="brand-container-side">
                        <span class="iso-x-side">X</span>
                        <h2>TRADE<span class="green-text">LOGIX</span></h2>
                    </div>
                </div>
                <ul class="nav-links">
                    <li onclick="navigate('newTrade')" class="nav-item"><i class="fas fa-plus-circle"></i> Nuevo Trade</li>
                    <li onclick="navigate('dashboard')" class="nav-item active"><i class="fas fa-chart-line"></i> Dashboard</li>
                    <li onclick="navigate('calendar')" class="nav-item"><i class="fas fa-calendar-alt"></i> Calendario</li>
                    <li onclick="navigate('stats')" class="nav-item"><i class="fas fa-percentage"></i> Estadísticas</li>
                </ul>
                <div class="sidebar-footer">
                    <li onclick="logout()" class="nav-item logout"><i class="fas fa-sign-out-alt"></i> Salir del Terminal</li>
                </div>
            </nav>
            <main class="main-content">
                <div id="content"></div>
            </main>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
